<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Confirm your ZANA account</title>
</head>
<body style="margin:0;padding:0;background-color:#0f141b;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0f141b;">
  <tr>
    <td align="center" style="padding:56px 24px;">
    <table width="100%" cellpadding="0" cellspacing="0" style="max-width:500px;">

      <!-- LOGO -->
      <tr>
        <td align="center" style="padding-bottom:40px;">
          <img src="https://raw.githubusercontent.com/javi-zana/zanafitness/main/public/logo.png" alt="ZANA Fitness" width="130" style="display:block;max-width:130px;" />
        </td>
      </tr>

      <!-- ACCENT LINE -->
      <tr>
        <td align="center" style="padding-bottom:40px;">
          <table width="40" cellpadding="0" cellspacing="0">
            <tr><td style="height:1px;background-color:#b3cdff;font-size:0;line-height:0;">&nbsp;</td></tr>
          </table>
        </td>
      </tr>

      <!-- CARD -->
      <tr>
        <td style="background-color:#121821;border:1px solid #2d3a4b;border-radius:4px;padding:48px 40px;">

          <p style="margin:0 0 20px;font-family:'Courier New',Courier,monospace;font-size:9px;letter-spacing:4px;color:#b3cdff;text-transform:uppercase;text-align:center;">
            — Confirm Account —
          </p>

          <h1 style="margin:0 0 8px;font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:200;letter-spacing:6px;color:#ffffff;text-transform:uppercase;text-align:center;line-height:1.2;">
            ONE MORE
          </h1>
          <h1 style="margin:0 0 36px;font-family:Arial,Helvetica,sans-serif;font-size:28px;font-weight:200;letter-spacing:6px;color:#b3cdff;text-transform:uppercase;text-align:center;line-height:1.2;">
            STEP.
          </h1>

          <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:32px;">
            <tr><td style="height:1px;background-color:#2d3a4b;font-size:0;line-height:0;">&nbsp;</td></tr>
          </table>

          <p style="margin:0 0 32px;font-family:'Courier New',Courier,monospace;font-size:12px;line-height:1.8;letter-spacing:1px;color:#9ca3af;text-align:center;">
            Confirm your email address to activate your ZANA account and access your dashboard.
          </p>

          <table width="100%" cellpadding="0" cellspacing="0">
            <tr>
              <td align="center">
                <a href="{{ .ConfirmationURL }}"
                  style="display:inline-block;background-color:#b3cdff;color:#0f141b;font-family:'Courier New',Courier,monospace;font-size:9px;font-weight:700;letter-spacing:4px;text-transform:uppercase;text-decoration:none;padding:16px 40px;border-radius:100px;">
                  Confirm Email
                </a>
              </td>
            </tr>
          </table>

          <p style="margin:32px 0 0;font-family:'Courier New',Courier,monospace;font-size:9px;line-height:1.8;letter-spacing:1px;color:#4b5563;text-align:center;">
            If you didn't create a ZANA account, you can safely ignore this email.
          </p>

        </td>
      </tr>

      <tr>
        <td style="padding-top:40px;padding-bottom:20px;">
          <table width="100%" cellpadding="0" cellspacing="0">
            <tr><td style="height:1px;background-color:#1a222c;font-size:0;line-height:0;">&nbsp;</td></tr>
          </table>
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom:8px;">
          <p style="margin:0;font-family:'Courier New',Courier,monospace;font-size:10px;letter-spacing:2px;color:#4b5563;text-transform:uppercase;">
            Built for results. Not motivation.
          </p>
        </td>
      </tr>
      <tr>
        <td align="center">
          <p style="margin:0;font-family:'Courier New',Courier,monospace;font-size:10px;letter-spacing:1px;color:#374151;text-transform:uppercase;">
            &copy; 2026 Zana Fitness &nbsp;&middot;&nbsp;
            <a href="https://zana-fitness.vercel.app/terms" style="color:#374151;text-decoration:none;">Terms</a>
            &nbsp;&middot;&nbsp;
            <a href="https://zana-fitness.vercel.app/privacy" style="color:#374151;text-decoration:none;">Privacy</a>
          </p>
        </td>
      </tr>

    </table>
    </td>
  </tr>
</table>
</body>
</html>
